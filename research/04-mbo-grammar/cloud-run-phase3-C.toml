[experiment]
name = "mbo-grammar-phase3-C"

[container]
dockerfile = "Dockerfile"
dockerhub_repo = "kurtbell87/mbo-dl"

[instance]
region = "us-east-1"
max_runtime_minutes = 480
gpu = true

[runpod]
gpu_type = "NVIDIA L40S"
container_disk_gb = 20
gpu_count = 1

[data]
# No book_state or mids — only tokens + precomputed sidecars (14.2 GB total)
# Precomputed files uploaded by condition B pod (run B first)
sources = [
    { s3 = "s3://kenoma-labs-research/cloud-runs/mbo-grammar/tokens.bin", path = "/data/tokens.bin" },
    { s3 = "s3://kenoma-labs-research/cloud-runs/mbo-grammar/commit_positions.bin", path = "/data/commit_positions.bin" },
    { s3 = "s3://kenoma-labs-research/cloud-runs/mbo-grammar/direction_targets.bin", path = "/data/direction_targets.bin" },
]

[results]
s3_prefix = "s3://kenoma-labs-research/runs"

[run]
command = "bash /experiment/run_phase3_C.sh"

[heartbeat]
interval_seconds = 60
timeout_minutes = 30
